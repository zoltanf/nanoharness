<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Playwright Web Testing Works</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  h1 {
    text-align: center;
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
    background: linear-gradient(135deg, #45d483, #2dd4bf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 2.5rem;
    font-size: 0.95rem;
  }

  /* Step navigation */
  .step-nav {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .step-btn {
    background: #1e2130;
    border: 2px solid #2a2f45;
    color: #94a3b8;
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.3s;
  }
  .step-btn:hover { border-color: #45d483; color: #e2e8f0; }
  .step-btn.active {
    background: linear-gradient(135deg, #45d483, #2dd4bf);
    color: #0f1117;
    border-color: transparent;
  }

  /* Main diagram area */
  .diagram-container {
    max-width: 820px;
    margin: 0 auto 2rem;
    position: relative;
  }

  .scene {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .scene.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Architecture boxes */
  .arch-row {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .arch-box {
    background: #1a1d2e;
    border: 1.5px solid #2a2f45;
    border-radius: 14px;
    padding: 1.4rem 1.6rem;
    min-width: 200px;
    max-width: 260px;
    flex: 1;
    text-align: center;
    transition: all 0.3s;
  }
  .arch-box.highlight {
    border-color: #45d483;
    box-shadow: 0 0 24px rgba(69, 212, 131, 0.15);
  }
  .arch-box .icon { font-size: 2rem; margin-bottom: 0.6rem; }
  .arch-box .label {
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 0.3rem;
  }
  .arch-box .desc {
    font-size: 0.82rem;
    color: #94a3b8;
    line-height: 1.5;
  }

  /* Arrow */
  .arrow-down {
    text-align: center;
    font-size: 1.6rem;
    color: #45d483;
    margin: 0.6rem 0;
    animation: bounce 1.5s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(5px); }
  }
  .arrow-right {
    font-size: 1.4rem;
    color: #45d483;
    display: flex;
    align-items: center;
  }

  /* Code panel */
  .code-panel {
    background: #161825;
    border: 1.5px solid #2a2f45;
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    margin-top: 1rem;
    font-family: 'Fira Code', 'Cascadia Code', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    overflow-x: auto;
    position: relative;
  }
  .code-panel .tag {
    position: absolute;
    top: 0.6rem; right: 0.8rem;
    background: #2a2f45;
    color: #94a3b8;
    font-size: 0.7rem;
    padding: 0.15rem 0.6rem;
    border-radius: 999px;
    font-family: 'Segoe UI', sans-serif;
  }
  .kw { color: #c084fc; }
  .str { color: #45d483; }
  .fn { color: #60a5fa; }
  .cm { color: #475569; }
  .num { color: #fbbf24; }

  /* Explanation text */
  .explain {
    background: #1a1d2e;
    border-left: 3px solid #45d483;
    border-radius: 0 10px 10px 0;
    padding: 1rem 1.4rem;
    margin-top: 1.2rem;
    font-size: 0.9rem;
    line-height: 1.65;
    color: #cbd5e1;
  }
  .explain strong { color: #45d483; }

  /* Flow diagram */
  .flow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin: 1rem 0;
  }
  .flow-step {
    background: #1a1d2e;
    border: 1.5px solid #2a2f45;
    border-radius: 10px;
    padding: 0.7rem 1rem;
    font-size: 0.82rem;
    font-weight: 600;
    text-align: center;
    min-width: 100px;
  }
  .flow-step.active-flow {
    border-color: #45d483;
    background: rgba(69, 212, 131, 0.08);
  }
  .flow-arrow { color: #45d483; font-size: 1.2rem; }

  /* Browser mockup */
  .browser {
    background: #1a1d2e;
    border: 1.5px solid #2a2f45;
    border-radius: 12px;
    overflow: hidden;
    margin-top: 1rem;
  }
  .browser-bar {
    background: #12141f;
    padding: 0.5rem 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #ef4444; }
  .dot.y { background: #fbbf24; }
  .dot.g { background: #45d483; }
  .url-bar {
    background: #1a1d2e;
    border-radius: 6px;
    padding: 0.25rem 0.8rem;
    font-size: 0.75rem;
    color: #94a3b8;
    flex: 1;
    margin-left: 0.5rem;
  }
  .browser-content {
    padding: 1.5rem;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.5rem;
  }
  .browser-content .fake-btn {
    background: linear-gradient(135deg, #45d483, #2dd4bf);
    color: #0f1117;
    border: none;
    padding: 0.5rem 1.6rem;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    position: relative;
  }
  .cursor-icon {
    position: absolute;
    bottom: -14px;
    right: -14px;
    font-size: 1.2rem;
    animation: clickPulse 1.5s infinite;
  }
  @keyframes clickPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  /* Result badges */
  .results {
    display: flex; gap: 1rem; justify-content: center;
    flex-wrap: wrap; margin-top: 1rem;
  }
  .result-card {
    background: #1a1d2e;
    border-radius: 12px;
    padding: 1rem 1.4rem;
    text-align: center;
    min-width: 140px;
    border: 1.5px solid #2a2f45;
  }
  .result-card .big { font-size: 1.6rem; font-weight: 800; }
  .result-card .rlabel { font-size: 0.78rem; color: #94a3b8; margin-top: 0.2rem; }
  .pass { color: #45d483; }
  .fail { color: #ef4444; }
  .skip { color: #fbbf24; }
</style>
</head>
<body>

<h1>🎭 How Playwright Web Testing Works</h1>
<p class="subtitle">Click through each step to explore the full picture</p>

<div class="step-nav" id="nav"></div>

<div class="diagram-container" id="scenes"></div>

<script>
const steps = [
  {
    title: "1. Architecture",
    content: `
      <div class="explain">
        Playwright has a <strong>layered architecture</strong>. Your test script talks to the Playwright library, which controls real browsers via their <strong>DevTools Protocol</strong> — no webdrivers or middlemen needed.
      </div>
      <div class="arch-row" style="margin-top:1.2rem">
        <div class="arch-box highlight">
          <div class="icon">📝</div>
          <div class="label">Your Test Script</div>
          <div class="desc">Written in JS/TS, Python, Java, or C#. Describes what to do & assert.</div>
        </div>
        <div class="arch-box highlight">
          <div class="icon">🎭</div>
          <div class="label">Playwright Library</div>
          <div class="desc">Translates your commands into browser protocol messages.</div>
        </div>
      </div>
      <div class="arrow-down">⬇</div>
      <div class="arch-row">
        <div class="arch-box">
          <div class="icon">🌐</div>
          <div class="label">Chromium</div>
          <div class="desc">Chrome / Edge engine</div>
        </div>
        <div class="arch-box">
          <div class="icon">🦊</div>
          <div class="label">Firefox</div>
          <div class="desc">Gecko engine</div>
        </div>
        <div class="arch-box">
          <div class="icon">🧭</div>
          <div class="label">WebKit</div>
          <div class="desc">Safari engine</div>
        </div>
      </div>
      <div class="explain" style="margin-top:1rem">
        Key difference from Selenium: Playwright connects <strong>directly</strong> to the browser process — no HTTP-based WebDriver server in between. This makes it faster and more reliable.
      </div>
    `
  },
  {
    title: "2. Test Lifecycle",
    content: `
      <div class="explain">
        Every Playwright test follows this <strong>lifecycle</strong>. The framework handles browser launch, page creation, and cleanup automatically.
      </div>
      <div class="flow" style="margin-top:1.2rem">
        <div class="flow-step active-flow">🚀 Launch<br>Browser</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step active-flow">📄 Create<br>Context</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step active-flow">🗂 Open<br>Page</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step active-flow">🎯 Run<br>Actions</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step active-flow">✅ Assert<br>Results</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step active-flow">🧹 Tear<br>Down</div>
      </div>
      <div class="explain" style="margin-top:1rem">
        <strong>Browser Context</strong> = an isolated "incognito" session. Each test gets its own context so cookies, storage, and state don't leak between tests. This means tests can run <strong>in parallel</strong> safely.
      </div>
      <div class="code-panel" style="margin-top:1rem">
        <span class="tag">TypeScript</span>
<span class="kw">import</span> { <span class="fn">test</span>, <span class="fn">expect</span> } <span class="kw">from</span> <span class="str">'@playwright/test'</span>;

<span class="fn">test</span>(<span class="str">'user can log in'</span>, <span class="kw">async</span> ({ <span class="fn">page</span> }) => {
  <span class="cm">// page is auto-created in a fresh context</span>
  <span class="kw">await</span> page.<span class="fn">goto</span>(<span class="str">'https://myapp.com/login'</span>);
  <span class="kw">await</span> page.<span class="fn">fill</span>(<span class="str">'#email'</span>, <span class="str">'user@test.com'</span>);
  <span class="kw">await</span> page.<span class="fn">fill</span>(<span class="str">'#password'</span>, <span class="str">'secret'</span>);
  <span class="kw">await</span> page.<span class="fn">click</span>(<span class="str">'button[type="submit"]'</span>);
  <span class="kw">await</span> <span class="fn">expect</span>(page).<span class="fn">toHaveURL</span>(<span class="str">'/dashboard'</span>);
});
      </div>
    `
  },
  {
    title: "3. Locators & Actions",
    content: `
      <div class="explain">
        Playwright finds elements using <strong>Locators</strong> — smart selectors that auto-wait and auto-retry. You interact with the page just like a real user would.
      </div>
      <div class="browser" style="margin-top:1rem">
        <div class="browser-bar">
          <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
          <div class="url-bar">https://myapp.com/signup</div>
        </div>
        <div class="browser-content">
          <div style="color:#94a3b8;font-size:0.85rem">Sign up for MyApp</div>
          <input type="text" placeholder="Enter your email..." style="background:#12141f;border:1.5px solid #2a2f45;border-radius:8px;padding:0.4rem 0.8rem;color:#e2e8f0;width:220px;font-size:0.85rem">
          <div style="position:relative;display:inline-block">
            <div class="fake-btn">Create Account<span class="cursor-icon">🖱️</span></div>
          </div>
        </div>
      </div>
      <div class="code-panel" style="margin-top:1rem">
        <span class="tag">Locator strategies</span>
<span class="cm">// ✅ Best: role-based (accessible & resilient)</span>
page.<span class="fn">getByRole</span>(<span class="str">'button'</span>, { name: <span class="str">'Create Account'</span> })

<span class="cm">// ✅ Good: text & label-based</span>
page.<span class="fn">getByText</span>(<span class="str">'Sign up for MyApp'</span>)
page.<span class="fn">getByLabel</span>(<span class="str">'Enter your email'</span>)

<span class="cm">// ⚠️ Fallback: CSS / test IDs</span>
page.<span class="fn">locator</span>(<span class="str">'[data-testid="signup-btn"]'</span>)

<span class="cm">// Common actions:</span>
<span class="kw">await</span> locator.<span class="fn">click</span>()
<span class="kw">await</span> locator.<span class="fn">fill</span>(<span class="str">'hello'</span>)
<span class="kw">await</span> locator.<span class="fn">hover</span>()
<span class="kw">await</span> locator.<span class="fn">selectOption</span>(<span class="str">'value'</span>)
      </div>
      <div class="explain" style="margin-top:1rem">
        Locators <strong>auto-wait</strong> for elements to be visible, enabled, and stable before acting — no need for manual <code>sleep()</code> or <code>waitFor()</code> in most cases.
      </div>
    `
  },
  {
    title: "4. Auto-Waiting",
    content: `
      <div class="explain">
        This is Playwright's superpower. Every action has <strong>built-in smart waits</strong>, which eliminates the most common source of flaky tests.
      </div>
      <div style="margin-top:1.2rem">
        <div class="arch-row">
          <div class="arch-box" style="max-width:360px">
            <div class="icon">😩</div>
            <div class="label" style="color:#ef4444">Without auto-wait (Selenium)</div>
            <div class="code-panel" style="font-size:0.75rem;text-align:left;margin-top:0.6rem;border-color:#ef4444">
<span class="cm">// Fragile & flaky</span>
driver.<span class="fn">sleep</span>(<span class="num">3000</span>)
el = driver.<span class="fn">find</span>(<span class="str">'#btn'</span>)
el.<span class="fn">click</span>()
<span class="cm">// 💥 Element not interactable!</span>
            </div>
          </div>
          <div class="arch-box" style="max-width:360px">
            <div class="icon">😎</div>
            <div class="label" style="color:#45d483">With auto-wait (Playwright)</div>
            <div class="code-panel" style="font-size:0.75rem;text-align:left;margin-top:0.6rem;border-color:#45d483">
<span class="cm">// Reliable & clean</span>
<span class="kw">await</span> page.<span class="fn">click</span>(<span class="str">'#btn'</span>)
<span class="cm">// ✅ Waits until visible, enabled,</span>
<span class="cm">//    stable, not obscured</span>
            </div>
          </div>
        </div>
      </div>
      <div class="flow" style="margin-top:1.2rem">
        <div class="flow-step">Element<br>attached?</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">Visible?</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">Stable?</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">Enabled?</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step active-flow">✅ Act!</div>
      </div>
      <div class="explain" style="margin-top:1rem">
        Playwright checks all these conditions <strong>automatically</strong> before performing any click, fill, or hover. Default timeout is 30 seconds — configurable per action or globally.
      </div>
    `
  },
  {
    title: "5. Assertions",
    content: `
      <div class="explain">
        Playwright's <strong>web-first assertions</strong> also auto-retry. Instead of checking once and failing, they keep polling until the condition is true or the timeout expires.
      </div>
      <div class="code-panel" style="margin-top:1rem">
        <span class="tag">Assertions</span>
<span class="cm">// Page-level assertions</span>
<span class="kw">await</span> <span class="fn">expect</span>(page).<span class="fn">toHaveTitle</span>(<span class="str">'Dashboard'</span>);
<span class="kw">await</span> <span class="fn">expect</span>(page).<span class="fn">toHaveURL</span>(<span class="str">/dashboard/</span>);

<span class="cm">// Element assertions (auto-retry!)</span>
<span class="kw">await</span> <span class="fn">expect</span>(locator).<span class="fn">toBeVisible</span>();
<span class="kw">await</span> <span class="fn">expect</span>(locator).<span class="fn">toHaveText</span>(<span class="str">'Welcome back!'</span>);
<span class="kw">await</span> <span class="fn">expect</span>(locator).<span class="fn">toHaveCount</span>(<span class="num">5</span>);
<span class="kw">await</span> <span class="fn">expect</span>(locator).<span class="fn">toBeDisabled</span>();

<span class="cm">// Negation</span>
<span class="kw">await</span> <span class="fn">expect</span>(locator).<span class="fn">not</span>.<span class="fn">toBeVisible</span>();
      </div>
      <div class="arch-row" style="margin-top:1.2rem">
        <div class="arch-box" style="border-color:#45d483">
          <div class="label">Auto-retrying ✅</div>
          <div class="desc"><code>toBeVisible()</code>, <code>toHaveText()</code>, <code>toHaveURL()</code> — keeps polling the DOM</div>
        </div>
        <div class="arch-box" style="border-color:#fbbf24">
          <div class="label">Non-retrying ⚡</div>
          <div class="desc"><code>toEqual()</code>, <code>toBeTruthy()</code> — snapshot checks on already-fetched values</div>
        </div>
      </div>
    `
  },
  {
    title: "6. Test Runner",
    content: `
      <div class="explain">
        Playwright ships its own <strong>test runner</strong> with parallelism, retries, reporters, and a gorgeous HTML report — all built in.
      </div>
      <div class="code-panel" style="margin-top:1rem">
        <span class="tag">Terminal</span>
<span class="cm"># Run all tests (parallel by default)</span>
$ npx playwright test

<span class="cm"># Run in headed mode (see the browser)</span>
$ npx playwright test <span class="str">--headed</span>

<span class="cm"># Run specific file</span>
$ npx playwright test <span class="str">login.spec.ts</span>

<span class="cm"># Debug interactively</span>
$ npx playwright test <span class="str">--debug</span>

<span class="cm"># View last test report</span>
$ npx playwright show-report
      </div>
      <div class="results" style="margin-top:1.2rem">
        <div class="result-card">
          <div class="big pass">24</div>
          <div class="rlabel">✅ Passed</div>
        </div>
        <div class="result-card">
          <div class="big fail">1</div>
          <div class="rlabel">❌ Failed</div>
        </div>
        <div class="result-card">
          <div class="big skip">2</div>
          <div class="rlabel">⏭ Skipped</div>
        </div>
        <div class="result-card">
          <div class="big" style="color:#60a5fa">3</div>
          <div class="rlabel">🌐 Browsers</div>
        </div>
      </div>
      <div class="explain" style="margin-top:1rem">
        Tests run across all three browsers in parallel by default. The HTML report includes <strong>traces</strong> — step-by-step recordings with screenshots, DOM snapshots, and network logs you can scrub through like a video.
      </div>
    `
  }
];

// Render nav
const nav = document.getElementById('nav');
const scenes = document.getElementById('scenes');
let current = 0;

steps.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'step-btn' + (i === 0 ? ' active' : '');
  btn.textContent = s.title;
  btn.onclick = () => show(i);
  nav.appendChild(btn);

  const scene = document.createElement('div');
  scene.className = 'scene' + (i === 0 ? ' active' : '');
  scene.innerHTML = s.content;
  scenes.appendChild(scene);
});

function show(idx) {
  document.querySelectorAll('.step-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.scene').forEach((s, i) => s.classList.toggle('active', i === idx));
  current = idx;
}
</script>
</body>
</html>
